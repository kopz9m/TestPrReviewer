name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review changed files
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const MARKER = '<!-- code-review-summary -->';

            let body;
            if (files.length === 0) {
              body = `${MARKER}\n## 📋 Code Review Summary\n\nNo files were changed in this pull request.\n\n> Automated review triggered by GitHub Actions.`;
            } else {
              const summary = files.map(f => `- **${f.filename}** (\`${f.status}\`): +${f.additions} / -${f.deletions}`).join('\n');
              body = `${MARKER}\n## 📋 Code Review Summary\n\n**Changed files (${files.length}):**\n\n${summary}\n\n> Automated review triggered by GitHub Actions.`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
