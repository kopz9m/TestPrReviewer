name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AI Code Review
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const MARKER = '<!-- code-review-summary -->';

            let aiReview = '';

            if (files.length === 0) {
              aiReview = 'No files were changed in this pull request.';
            } else {
              // Build a diff summary to send to the AI
              const diffChunks = files.map(f => {
                const patch = f.patch ? `\n\`\`\`diff\n${f.patch}\n\`\`\`` : ' (binary or no diff available)';
                return `### ${f.filename} (${f.status}: +${f.additions}/-${f.deletions})${patch}`;
              }).join('\n\n');

              const prompt = [
                'You are an expert code reviewer. Review the following pull request diff and provide:',
                '1. A brief summary of what the changes do',
                '2. Potential issues, bugs, or security concerns',
                '3. Suggestions for improvement',
                '4. An overall assessment (Approve / Request Changes / Comment)',
                '',
                'Be concise but thorough. Format your response in Markdown.',
                '',
                'Pull request diff:',
                diffChunks,
              ].join('\n');

              const response = await fetch('https://models.inference.ai.azure.com/chat/completions', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                },
                body: JSON.stringify({
                  model: 'gpt-4o-mini',
                  messages: [{ role: 'user', content: prompt }],
                  max_tokens: 1500,
                  temperature: 0.2,
                }),
              });

              if (!response.ok) {
                const errorText = await response.text();
                core.warning(`GitHub Models API error: ${response.status} ${errorText}`);
                aiReview = `⚠️ AI review could not be generated (API error ${response.status}). Please review manually.`;
              } else {
                const json = await response.json();
                aiReview = json.choices?.[0]?.message?.content?.trim() || 'No review content returned.';
              }
            }

            const body = `${MARKER}\n## 🤖 AI Code Review\n\n${aiReview}\n\n> Automated AI review triggered by GitHub Actions.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
